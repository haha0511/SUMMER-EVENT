<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Summer Event - 상점</title>

    <link rel="stylesheet" href="shop.css">

</head>

<body>

<div id="shopArea">

    <!-- 배경 -->
    <img
        src="../image/background.png"
        id="background"
        draggable="false"
    >

    <!-- 상단 -->
    <div id="topBar">

        <button id="homeButton">
            🏠 홈
        </button>

        <div id="title">
            🛒 상점
        </div>

        <div id="shellBox">
            🐚 <span id="shellPoint">0</span>
        </div>

    </div>

    <!-- 상품 목록 -->
    <div id="shopGrid">

        <!-- 삽 -->
        <div class="item">

            <div class="emoji">
                ⛏️
            </div>

            <div class="name">
                삽 x4
            </div>

            <div class="description">
                모래를 팔 수 있는 삽 4개
            </div>

            <div class="price">
                🐚 100
            </div>

            <button
                class="buyButton"
                id="buyShovel">
                구매
            </button>

        </div>

        <!-- 준비중 -->
        <div class="item disabled">

            <div class="emoji">
                🎁
            </div>

            <div class="name">
                준비중
            </div>

            <div class="description">
                곧 추가됩니다.
            </div>

            <div class="price">
                -
            </div>

            <button class="buyButton">
                준비중
            </button>

        </div>

        <!-- 준비중 -->
        <div class="item disabled">

            <div class="emoji">
                ⭐
            </div>

            <div class="name">
                준비중
            </div>

            <div class="description">
                곧 추가됩니다.
            </div>

            <div class="price">
                -
            </div>

            <button class="buyButton">
                준비중
            </button>

        </div>

        <!-- 준비중 -->
        <div class="item disabled">

            <div class="emoji">
                👑
            </div>

            <div class="name">
                준비중
            </div>

            <div class="description">
                곧 추가됩니다.
            </div>

            <div class="price">
                -
            </div>

            <button class="buyButton">
                준비중
            </button>

        </div>

    </div>

</div>

<script type="module" src="shop.js"></script>

</body>

</html>
