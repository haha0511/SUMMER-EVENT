<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Summer Event - 상점</title>

    <link rel="stylesheet" href="shop.css">

</head>

<body>

<div id="shopArea">

    <!-- 배경 -->
    <img
        src="../image/background.png"
        id="background"
        draggable="false"
    >

    <!-- 상단 -->
    <div id="topBar">

        <button id="homeButton">
            🏠 홈
        </button>

        <div id="title">
            🛒 상점
        </div>

        <div id="shellBox">
            🐚 <span id="shellPoint">0</span>
        </div>

    </div>

    <!-- 상품 목록 -->
    <div id="shopGrid">

        <!-- 삽 -->
        <div class="item">

            <div class="emoji">
                ⛏️
            </div>

            <div class="name">
                삽 x4
            </div>

            <div class="description">
                모래를 팔 수 있는 삽 4개
            </div>

            <div class="price">
                🐚 100
            </div>

            <button
                class="buyButton"
                id="buyShovel">
                구매
            </button>
        </div>

        <div class="item">

            <div class="emoji">⚡</div>

            <div class="name">
        황금 삽
            </div>

            <div class="description">
        다음 10번 보상 2배
            </div>

            <div class="price">
        🐚 500
            </div>

            <button
                class="buyButton"
                id="buyGolden">
                구매
            </button>

        </div>

        </div>

            <div class="item">

                <div class="emoji">🍀</div>

                <div class="name">행운의 조개</div>

                <div class="description">
                희귀 아이템 확률 증가
                </div>

                <div class="price">
                🐚 300
                </div>

                 <button
                    class="buyButton"
                    id="buyLucky">
                구매
                 </button>

            <div class="item">

                <div class="emoji">⏳</div>

                <div class="name">
        모래시계
                </div>

                <div class="description">
        삽 10개 즉시 지급
                </div>

                <div class="price">
        🐚 250
                </div>

                <button
                    class="buyButton"
                    id="buyHourglass">
                    구매
                </button>

        </div>


    </div>

</div>

<script type="module" src="shop.js"></script>

</body>

</html>
