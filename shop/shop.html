<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>상점</title>

    <link rel="stylesheet" href="shop.css">

</head>

<body>

<div id="shopArea">

    <!-- 배경 -->

    <img
        id="background"
        src="../image/beach.png"
        draggable="false"
    >

    <!-- 상단 -->

    <div id="topBar">

        <button id="homeButton">

            🏠 홈

        </button>

        <div id="title">

            🛒 상점

        </div>

        <div id="shellBox">

            🐚
            <span id="shellPoint">

                0

            </span>

        </div>

    </div>

    <!-- 상점 목록 -->

    <div id="shopGrid">

        <!-- 삽 -->

        <div class="item">

            <div class="emoji">

                ⛏️

            </div>

            <div class="name">

                삽 묶음

            </div>

            <div class="description">

                삽 +4개

            </div>

            <div class="price">

                🐚 500

            </div>

            <button
                class="buyButton"
                data-item="shovel"
                data-price="500"
            >

                구매

            </button>

        </div>

        <!-- (추후 추가 예정) -->

        <div class="item disabled">

            <div class="emoji">

                💣

            </div>

            <div class="name">

                폭탄 삽

            </div>

            <div class="description">

                준비 중

            </div>

            <div class="price">

                Coming Soon

            </div>

        </div>

        <div class="item disabled">

            <div class="emoji">

                🍀

            </div>

            <div class="name">

                럭키 부적

            </div>

            <div class="description">

                준비 중

            </div>

            <div class="price">

                Coming Soon

            </div>

        </div>

        <div class="item disabled">

            <div class="emoji">

                📦

            </div>

            <div class="name">

                특별 상자

            </div>

            <div class="description">

                준비 중

            </div>

            <div class="price">

                Coming Soon

            </div>

        </div>

    </div>

</div>

<script src="shop.js"></script>

</body>

</html>
