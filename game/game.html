<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Summer Event - 게임</title>

    <link rel="stylesheet" href="game.css">

</head>

<body>

<div id="gameArea">

    <!-- 배경 -->
<img
    src="../image/beach.png"
    id="background"
    draggable="false"
>

    <!-- 상단 -->
    <div id="topBar">

        <button id="homeButton">
            🏠 홈
        </button>

        <div id="title">
            🏖 모래 파기
        </div>

        <div id="shellBox">
            🐚 <span id="shellPoint">0</span>
        </div>

    </div>

    <!-- 삽 개수 -->
    <div id="digCount">
        ⛏️ <span id="remainDig">10</span>
    </div>

    <!-- 모래 클릭 영역 -->
    <div id="sandArea"></div>

    <!-- 파는 중 -->
    <div id="loadingScreen" class="hidden">

        <div id="loadingText">
            파는 중...
        </div>

        <div id="countDown">
            3
        </div>

    </div>

    <!-- 보상창 -->
    <div id="rewardScreen" class="hidden">

        <div id="rewardBox">

            <div id="rewardEmoji">
                🦪
            </div>

            <div id="rewardTitle">
                진주가 등장했습니다!
            </div>

            <div id="rewardPoint">
                +500 🐚
            </div>

            <button id="rewardButton">
                확인
            </button>

        </div>

    </div>

</div>

<script type="module" src="game.js"></script>

</body>

</html>
