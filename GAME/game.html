<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>모래 파기 게임</title>

    <link rel="stylesheet" href="game.css">

</head>

<body>

<div id="gameArea">

    <!-- 배경 -->
    <img
        id="background"
        src="../image/beach.png"
        draggable="false"
    >

    <!-- 상단 -->
    <div id="topBar">

        <button id="homeButton">
            🏠 홈
        </button>

        <div id="title">
            🏖 모래 파기
        </div>

        <div id="shellBox">
            🐚 <span id="shellPoint">0</span>
        </div>

    </div>

    <!-- 남은 삽 -->
    <div id="digCount">

        ⛏ 남은 삽 :
        <span id="remainDig">10</span>

    </div>

    <!-- 모래 영역 -->
    <div id="sandArea"></div>

    <!-- 파는 중 -->
    <div
        id="loadingScreen"
        class="hidden"
    >

        <div id="loadingText">

            ⛏ 모래를 파는 중...

        </div>

        <div id="countDown">

            3

        </div>

    </div>

    <!-- 보상창 -->
    <div
        id="rewardScreen"
        class="hidden"
    >

        <div id="rewardEmoji">

            ❔

        </div>

        <div id="rewardTitle">

            ???

        </div>

        <div id="rewardPoint">

            +0 🐚

        </div>

        <button id="rewardButton">

            확인

        </button>

    </div>

</div>

<script src="game.js"></script>

</body>

</html>
