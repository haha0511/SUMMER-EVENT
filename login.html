<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Summer Event - 로그인</title>

    <link rel="stylesheet" href="login.css?v=1">

</head>

<body>

<div id="loginBox">

    <h1>🏖 Summer Event</h1>

    <p>아이디와 비밀번호를 입력하세요.</p>

    <input
        type="text"
        id="id"
        placeholder="아이디"
        maxlength="20"
    >

    <input
        type="password"
        id="pw"
        placeholder="비밀번호"
        maxlength="30"
    >

    <button id="loginButton">

        로그인

    </button>

    <button id="registerButton">

        회원가입

    </button>

    <div id="message"></div>

</div>

<script type="module" src="login.js?v=1"></script>

</body>

</html>
