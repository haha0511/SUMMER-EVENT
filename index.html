<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Summer Event</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="gameArea">

    <!-- 배경 -->

    <img
        src="image/beach.png"
        id="background"
        draggable="false"
    >

    <!-- 상단 -->

    <div id="topBar">

        <div id="title">

            🏖 Summer Event

        </div>

        <div id="shell">

            🐚

            <span id="shellPoint">

                0

            </span>

        </div>

    </div>

    <!-- 게임 -->

    <div
        class="object"
        id="gameObject"
    >

        🎮

        <div>

            게임

        </div>

    </div>

    <!-- 상점 -->

    <div
        class="object"
        id="shopObject"
    >

        🛒

        <div>

            상점

        </div>

    </div>

    <!-- 공지 -->

    <div
        class="object"
        id="noticeObject"
    >

        📜

        <div>

            공지

        </div>

    </div>

    <!-- 랭킹 -->

    <div
        class="object"
        id="rankObject"
    >

        🏆

        <div>

            랭킹

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
